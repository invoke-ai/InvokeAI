# Check the `uv` lockfile for consistency with `pyproject.toml`.
#
# If this check fails, you should run `uv lock` to update the lockfile.
#
# Also checks that dependencies resolve for linux/aarch64, which no test job
# exercises. This is resolution-only and needs no ARM hardware.

name: 'uv lock checks'

on:
  push:
    branches:
      - 'main'
  pull_request:
    types:
      - 'ready_for_review'
      - 'opened'
      - 'synchronize'
  merge_group:
  workflow_dispatch:
    inputs:
      always_run:
        description: 'Always run the checks'
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      always_run:
        description: 'Always run the checks'
        required: true
        type: boolean
        default: true

jobs:
  uv-lock-checks:
    env:
      # uv requires a venv by default - but for this, we can simply use the system python
      UV_SYSTEM_PYTHON: 1
    runs-on: ubuntu-latest
    timeout-minutes: 5 # expected run time: <1 min
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: check for changed python files
        if: ${{ inputs.always_run != true }}
        id: changed-files
        # Pinned to the _hash_ for v45.0.9 to prevent supply-chain attacks.
        # See:
        # - CVE-2025-30066
        # - https://www.stepsecurity.io/blog/harden-runner-detection-tj-actions-changed-files-action-is-compromised
        # - https://github.com/tj-actions/changed-files/issues/2463
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96
        with:
          files_yaml: |
            uvlock-pyprojecttoml:
              - 'pyproject.toml'
              - 'uv.lock'

      - name: setup uv
        if: ${{ steps.changed-files.outputs.uvlock-pyprojecttoml_any_changed == 'true' || inputs.always_run == true }}
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: '0.6.10'
          enable-cache: true

      - name: check lockfile
        if: ${{ steps.changed-files.outputs.uvlock-pyprojecttoml_any_changed == 'true' || inputs.always_run == true }}
        run: uv lock --locked # this will exit with 1 if the lockfile is not consistent with pyproject.toml
        shell: bash

      - name: check aarch64 resolution
        if: ${{ steps.changed-files.outputs.uvlock-pyprojecttoml_any_changed == 'true' || inputs.always_run == true }}
        # On linux/aarch64, torch/torchvision must fall back to PyPI (the PyTorch WHL
        # indexes have no aarch64 torchvision wheels); the platform markers in
        # pyproject.toml that make this work are easy to silently break with a
        # dependency bump. Resolve each torch extra for aarch64 to catch that.
        # manylinux_2_28 matches the glibc floor of the torch/onnxruntime aarch64 wheels.
        run: |
          for extra in cpu cuda rocm; do
            uv pip compile pyproject.toml --extra $extra --python-platform aarch64-manylinux_2_28 --python-version 3.12 > /dev/null
          done
        shell: bash
