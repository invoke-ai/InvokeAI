# Runs frontend tests.
#
# Checks for changes to frontend files before running the tests.
# If always_run is true, always runs the tests.

name: 'frontend tests'

on:
  push:
    branches:
      - 'main'
  pull_request:
    types:
      - 'ready_for_review'
      - 'opened'
      - 'synchronize'
  merge_group:
  workflow_dispatch:
    inputs:
      always_run:
        description: 'Always run the tests'
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      always_run:
        description: 'Always run the tests'
        required: true
        type: boolean
        default: true

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # expected run time: <2 min
    defaults:
      run:
        working-directory: invokeai/frontend/web
    steps:
      - uses: actions/checkout@v6

      - name: check for changed frontend files
        if: ${{ inputs.always_run != true }}
        id: changed-files
        # Pinned to the _hash_ for v45.0.9 to prevent supply-chain attacks.
        # See:
        # - CVE-2025-30066
        # - https://www.stepsecurity.io/blog/harden-runner-detection-tj-actions-changed-files-action-is-compromised
        # - https://github.com/tj-actions/changed-files/issues/2463
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96
        with:
          files_yaml: |
            frontend:
              - 'invokeai/frontend/web/**'

      - name: install dependencies
        if: ${{ steps.changed-files.outputs.frontend_any_changed == 'true' || inputs.always_run == true }}
        uses: ./.github/actions/install-frontend-deps

      - name: vitest
        if: ${{ steps.changed-files.outputs.frontend_any_changed == 'true' || inputs.always_run == true }}
        run: 'pnpm test:no-watch'
        shell: bash

  frontend-webv2-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # expected run time: <2 min
    defaults:
      run:
        working-directory: invokeai/frontend/webv2
    steps:
      - uses: actions/checkout@v6

      - name: check for changed webv2 files
        if: ${{ inputs.always_run != true }}
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96
        with:
          files_yaml: |
            webv2:
              - '.github/workflows/frontend-tests.yml'
              - 'invokeai/frontend/webv2/**'

      - name: install dependencies
        if: ${{ steps.changed-files.outputs.webv2_any_changed == 'true' || inputs.always_run == true }}
        uses: ./.github/actions/install-frontend-deps
        with:
          working-directory: invokeai/frontend/webv2

      - name: install Chromium
        if: ${{ steps.changed-files.outputs.webv2_any_changed == 'true' || inputs.always_run == true }}
        run: 'pnpm exec playwright install chromium'
        shell: bash

      - name: architecture completion gates
        if: ${{ steps.changed-files.outputs.webv2_any_changed == 'true' || inputs.always_run == true }}
        run: 'pnpm check:architecture'
        shell: bash

      - name: upload architecture review artifacts
        if: ${{ always() && (steps.changed-files.outputs.webv2_any_changed == 'true' || inputs.always_run == true) }}
        uses: actions/upload-artifact@v6
        with:
          name: webv2-architecture-review
          path: |
            invokeai/frontend/webv2/artifacts/architecture
            invokeai/frontend/webv2/artifacts/architecture-performance
          if-no-files-found: ignore
